[toolchain]

[features]
resolution = true
skip-lint = false

[programs.localnet]
evidence_registry = "REPLACE_WITH_DEPLOYED_PROGRAM_ID"

[programs.devnet]
evidence_registry = "REPLACE_WITH_DEPLOYED_PROGRAM_ID"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "Devnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"

[test]
startup_wait = 5000
shutdown_wait = 2000
