services:
  - type: web
    name: witnesschain-backend
    env: node
    rootDir: apps/backend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SUPABASE_URL
      - key: SUPABASE_SERVICE_KEY
      - key: SOLANA_RPC_URL
      - key: PROGRAM_ID
      - key: SOLANA_PRIVATE_KEY
      - key: PINATA_JWT
      - key: ML_SERVICE_URL
        sync: false # Set this to your ML service URL after deploying it

  - type: web
    name: witnesschain-ml
    env: docker
    rootDir: ml/deepfake-detector
    plan: starter # ML models need more RAM
    envVars:
      - key: GEMINI_API_KEY
