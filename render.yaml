services:
  - type: web
    name: witnesschain-backend
    env: node
    rootDir: apps/backend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SOLANA_RPC_URL
        sync: false
      - key: PROGRAM_ID
        sync: false
      - key: SOLANA_PRIVATE_KEY
        sync: false
      - key: PINATA_JWT
        sync: false

  - type: web
    name: witnesschain-ml
    env: docker
    rootDir: ml/deepfake-detector
    envVars:
      - key: GEMINI_API_KEY
        sync: false
