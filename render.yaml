services:
  - type: web
    name: witnesschain-backend
    env: node
    rootDir: apps/backend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SUPABASE_URL
        fromParam: SUPABASE_URL
      - key: SUPABASE_SERVICE_KEY
        fromParam: SUPABASE_SERVICE_KEY
      - key: SOLANA_RPC_URL
        fromParam: SOLANA_RPC_URL
      - key: PROGRAM_ID
        fromParam: PROGRAM_ID
      - key: SOLANA_PRIVATE_KEY
        fromParam: SOLANA_PRIVATE_KEY
      - key: PINATA_JWT
        fromParam: PINATA_JWT

  - type: web
    name: witnesschain-ml
    env: docker
    rootDir: ml/deepfake-detector
    envVars:
      - key: GEMINI_API_KEY
        fromParam: GEMINI_API_KEY

parameters:
  - key: SUPABASE_URL
  - key: SUPABASE_SERVICE_KEY
  - key: SOLANA_RPC_URL
  - key: PROGRAM_ID
  - key: SOLANA_PRIVATE_KEY
  - key: PINATA_JWT
  - key: GEMINI_API_KEY
